name: Mod Suggestion
description: Suggest a mod to add or remove
labels: ["mod-request"]
body:
  - type: input
    id: mod_name
    attributes:
      label: Mod name
      placeholder: e.g. Create
    validations:
      required: true
  - type: input
    id: mod_link
    attributes:
      label: CurseForge / Modrinth link
      placeholder: https://www.curseforge.com/minecraft/mc-mods/...
  - type: textarea
    id: reason
    attributes:
      label: Why?
      description: What does this mod add to the pack experience?
    validations:
      required: true
  - type: dropdown
    id: action
    attributes:
      label: Action
      options:
        - Add this mod
        - Remove this mod
        - Replace with alternative
